name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish-server:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: win-arm64
            archive: zip
          - rid: linux-x64
            archive: tar
          - rid: linux-arm64
            archive: tar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/Sannel.Encoding.Manager.Web/Sannel.Encoding.Manager.Web.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          --output ./publish

      - name: Copy install scripts (Windows)
        if: startsWith(matrix.rid, 'win-')
        run: |
          cp scripts/server/install.ps1 ./publish/
          cp scripts/server/uninstall.ps1 ./publish/

      - name: Copy install scripts (Linux)
        if: startsWith(matrix.rid, 'linux-')
        run: |
          cp scripts/server/install.sh ./publish/
          cp scripts/server/uninstall.sh ./publish/
          chmod +x ./publish/install.sh ./publish/uninstall.sh

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath server-${{ matrix.rid }}.zip

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: tar -czf server-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.rid }}
          path: server-${{ matrix.rid }}.*

  publish-runner:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: win-arm64
            archive: zip
          - rid: linux-x64
            archive: tar
          - rid: linux-arm64
            archive: tar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/Sannel.Encoding.Runner/Sannel.Encoding.Runner.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          --output ./publish

      - name: Copy install scripts (Windows)
        if: startsWith(matrix.rid, 'win-')
        run: |
          cp scripts/runner/install.ps1 ./publish/
          cp scripts/runner/uninstall.ps1 ./publish/

      - name: Copy install scripts (Linux)
        if: startsWith(matrix.rid, 'linux-')
        run: |
          cp scripts/runner/install.sh ./publish/
          cp scripts/runner/uninstall.sh ./publish/
          chmod +x ./publish/install.sh ./publish/uninstall.sh

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath runner-${{ matrix.rid }}.zip

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: tar -czf runner-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.rid }}
          path: runner-${{ matrix.rid }}.*

  docker-server:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/encoding-manager-server
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Sannel.Encoding.Manager.Web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-runner:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/encoding-manager-runner
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Sannel.Encoding.Runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [publish-server, publish-runner, docker-server, docker-runner]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
          pattern: '{server,runner}-*'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            ./artifacts/*

  merge-to-main:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release branch
        id: branch
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "name=release/${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create pull request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "Merge ${{ github.ref_name }} into main" \
            --body "Automated PR to merge release branch \`${{ steps.branch.outputs.name }}\` into \`main\` after tagging \`${{ github.ref_name }}\`." \
            || echo "PR already exists or branch not found — skipping."
